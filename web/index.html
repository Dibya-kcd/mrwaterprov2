<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MrWater - Smart Water Jar Delivery Management">
  <!-- PWA meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MrWater">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <meta name="theme-color" content="#1A6BFF">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json?v=2">
  <!-- Favicon (Fallback to Icon-192.png if favicon.png is missing) -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png"/>
  <title>MrWater</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0A1F6E 0%, #1A6BFF 100%);
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden;
    }
    #loading {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    .app-name {
      color: #fff; font-size: 28px; font-weight: 800; letter-spacing: 1px;
    }
    .tagline {
      color: rgba(255,255,255,0.7); font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="app-name">mrwater</div>
    <div class="tagline">Smart Jar Delivery Management</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', () => {
      document.getElementById('loading').style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
